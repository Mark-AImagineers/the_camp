apiVersion: apps/v1
kind: Deployment
metadata:
  name: thecamp-frontend
  namespace: aim
  labels:
    app: thecamp-frontend
    environment: production
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: thecamp-frontend
  template:
    metadata:
      labels:
        app: thecamp-frontend
        environment: production
    spec:
      nodeSelector:
        kubernetes.io/hostname: aimph
      imagePullSecrets:
        - name: gitlab-registry-secret
      containers:
        - name: thecamp-frontend
          image: ${REGISTRY_IMAGE_FRONTEND}:${IMAGE_TAG}
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: thecamp-frontend
  namespace: aim
spec:
  selector:
    app: thecamp-frontend
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
